# 长风知识库中央目录 (KB Catalog) - Canonical Source
#
# 维护方:长风知识整理系统 (D:\changfeng\长风知识整理系统)
# 下游消费方:
#   - 智能标书系统 yibiao (D:\changfeng\智能标书\yibiao)
#   - 方案生成系统团队 (D:\aurora\方案生成系统)
#   - Dify 内聊天机器人 (长风知识库机器人)
#   - 100MB 标书 workflow(规划中)
#
# 更新规则:
#   1. 本文件是唯一真源。Dify 内新增/删除/重命名库必须同步更新本文件。
#   2. 下游系统启动时读此文件,不得硬编码 dataset id。
#   3. `roles` 字段对下游稳定(不随意改名),`id/name` 可变但需下游感知。

version: 5
last_updated: "2026-04-28"

# ---------- v5 变更 ----------
# 1. 增加 retrieval_defaults,明确下游默认检索基线:
#    hybrid_search + reranking_enable:true + score_threshold_enabled:false。
# 2. 为 政策文件 / 官方指导 / 政府动态 增加 retrieval 配置,与 Dify 后台混合检索 + qwen3-rerank + top_k 4 对齐。
# 3. 维护流程新增本地一致性校验:python -m minimum_workflow.kb_catalog_validator kb_catalog.yaml。
# ---------- v4 变更 ----------
# 1. 按 2026-04-28 live `changfeng-Dify-api` 知识库列表同步 id/name。
# 2. `产品库` / `案例库` 线上展示名已去掉"长风"前缀,UUID 不变。
# 3. `合作供应商资料` 线上 UUID 已变更为 e10ba417-785e-44e6-9914-4c71215f218f。
# 4. 补录结构调整后新增/恢复的库:
#    `行业知识` / `教育培训` / `长风实例库` / `低空行业动态` / `行业标准`。
# 5. 下游必须读取本文件 role_index,不得继续缓存 v3 的 dataset id。
# ---------- v3 变更 ----------
# 1. 新增 `competitor` role,指向 `自动--产品库` UUID(与 supplier_product 共用)
# 2. 增加说明:competitor role 需要**应用层**按 metadata `角色 == 竞品` 过滤
#    (Dify filter 不生效,且外部来源知识系统需要先下发 `角色` 字段并填值)
# ---------- v2 变更 ----------
# 1. retention_days 按外部来源知识系统 `config/sync_config.yaml` 实际值校准:
#    - 自动--公众号:     7   → 180
#    - 自动--新闻条目:   30  → 90
#    - 自动--新闻日报:   90  → 90 (不变)
#    - 自动--产品库:     null → 3650(不做 disable)
# 2. 4 个"自动--"库的 metadata_schema 改用英文版(news_v1 重写,新增 product_auto_v1)
# 3. 增加 external_field_mapping_doc 指针,权威字段定义由外部来源知识系统维护
# --------------------------------------------------------------------

external_field_mapping_doc: "D:\\changfeng\\外部来源知识\\docs\\external_kb_field_mapping.md"

# ========== 默认检索基线 ==========
# 下游若无更细粒度策略,按此参数调用 Dify retrieve。
# 单库有 retrieval 字段时,以单库配置覆盖对应字段。

retrieval_defaults:
  search_method: hybrid_search
  reranking_enable: true
  score_threshold_enabled: false
  top_k: 5

# ========== Tier 说明 ==========
# A = 核心业务层:慢变,高价值,默认主检索
# B = 结构化参考层:中频更新,按主题命中时检索
# C = 资讯流层:高频增长,独立通道,必须带时间过滤

# ========== ingest_source 说明 ==========
# manual = 人工确认入库(对应 dataset 名称不以"自动--"开头)
# auto   = API 自动抓取入库(对应"自动--"开头的库)

# ========== retention_days ==========
# null = 永久保留
# N    = 保留最近 N 天(归档脚本按发布日期迁出)

datasets:
  # ---------------- A 核心业务层 ----------------
  - id: 9b910bf7-796e-4754-9f76-e1a08f95ae72
    name: 产品库
    tier: A
    roles: [product, 产品推荐, 技术参数]
    metadata_schema: product_v1
    ingest_source: manual
    retention_days: null
    description: 长风自家产品 + 大疆渠道产品

  - id: 6d70c0ba-0af1-405a-ab2f-cab255a17bc0
    name: 案例库
    tier: A
    roles: [case, solution, 行业方案]
